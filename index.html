<!DOCTYPE html>
<html>
<head>
  <title>Chat App</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

h2 {
  color: #ffd60a;
}

#login {
  background: #ffd60a;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

#chat {
  width: 400px;
  margin: 20px auto;
  background: #1a1a1a;
  padding: 10px;
  border-radius: 12px;
}

#messages {
  height: 400px;
  overflow-y: auto;
  padding: 10px;
  background: #121212;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
}

.message {
  max-width: 70%;
  padding: 10px;
  margin: 6px;
  border-radius: 15px;
  word-break: break-word;
}


.me {
  align-self: flex-end;
}

.other {
  align-self: flex-start;
}

#messageInput {
  width: 70%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
}

#send {
  padding: 10px;
  background: #ffd60a;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
body.light {
  background: #f5f5f5;
  color: black;
}

/* SIDEBAR */
body.light #sidebar {
  background: #ffffff;
  color: black;
}

/* MAIN AREA */
body.light #main {
  background: #f5f5f5;
}

/* MESSAGES */
body.light #messages {
  background: #eeeeee;
}

/* INPUT AREA */
body.light #inputArea {
  background: #ffffff;
}

/* MESSAGE BUBBLES */

#app {
    display: flex;
    height: 100vh;
  }

  /* SIDEBAR */
  #sidebar {
    width: 250px;
    background: #111;
    color: white;
    padding: 15px;
    display: flex;
    flex-direction: column;
  }

  #sidebar h2 {
    color: #ffd60a;
  }

  #rooms p {
    padding: 8px;
    cursor: pointer;
    border-radius: 8px;
  }

  #rooms p:hover {
    background: #222;
  }

  /* MAIN */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #0f0f0f;
  }
  #messages {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

  /* INPUT AREA */
  #inputArea {
    display: flex;
    padding: 10px;
    background: #1a1a1a;
  }

  #messageInput {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
  }

  #send {
    margin-left: 10px;
    padding: 10px;
    background: #ffd60a;
    border: none;
    border-radius: 8px;
  }
  body.light #rooms p:hover {
  background: #e5e5e5;
  color: black;
  transition: 0.2s;
}
#listeners p {
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  cursor: pointer;
  background: #222;
  color: white;
}

body.light #listeners p {
  background: #f0f0f0;
  color: black;
}

#listeners p.active-listener {
  background: #444;
  color: white;
}

body.light #listeners p.active-listener {
  background: #ffd60a;
  color: black;
}



#messages div b,
#messages div small {
  color: inherit;
}
/* DARK MODE FIX */
body:not(.light) .me {
  color: #1a1a1a; /* dark text on yellow */
}

/* KEEP OTHER MESSAGES READABLE */
body:not(.light) .other {
  color: #e5e5e5;
}
.msg-name {
  font-size: 12px;
  font-weight: bold;
  margin-bottom: 4px;
  opacity: 0.8;
}

.msg-text {
  font-size: 15px;
  margin-bottom: 6px;
}

.msg-time {
  font-size: 10px;
  opacity: 0.6;
  text-align: right;
}
#messages > div {
  display: flex;
  flex-direction: column;
  margin: 8px;
  max-width: 70%;
}

/* ALIGN LEFT / RIGHT */
.me {
  align-self: flex-end;
}

.other {
  align-self: flex-start;
}

/* HEADER (name + icon) */
.msg-header {
  font-size: 12px;
  margin-bottom: 4px;
  opacity: 0.7;
}

/* BUBBLE */
.msg-bubble {
  padding: 10px;
  border-radius: 15px;
  position: relative;
}

/* MY MESSAGE (yellow) */
.me .msg-bubble {
  background: #ffd60a;
  color: #1a1a1a;
}

/* OTHER MESSAGE (dark) */
.other .msg-bubble {
  background: #2a2a2a;
  color: #e5e5e5;
}

/* TIME */
.msg-time {
  font-size: 10px;
  margin-top: 5px;
  text-align: right;
  opacity: 0.6;
}
body:not(.light) .msg-header {
  color: #e5e5e5;
}

/* LIGHT MODE: keep it dark */
body.light .msg-header {
  color: #222;
}
/* ALWAYS align text left inside bubbles */
.msg-bubble {
  text-align: left;
}
.msg-name {
  font-weight: 600;
}

</style>
</head>
<body>

<div id="app">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <h2>🐝 BeeChat</h2>
    <button id="toggleTheme">🌗 Mode</button>
    <button id="login">Login</button>

    <div id="rooms">
      <p>💬 General</p>
      <p>🧠 Therapy</p>
      <p>📚 Study Help</p>
    </div>
    <h3>Listeners</h3>
    <div id="listeners"></div>
    </div>

  <!-- MAIN CHAT -->
  <div id="main">
    <div id="messages"></div>

    <div id="inputArea">
      <input id="messageInput" placeholder="Type message..." />
      <button id="send">Send</button>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
